<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttenSync - Attendance Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
    
    <div class="header">
        <div class="brand-container">
            <div class="title"><i class="fas fa-graduation-cap"></i> AttenSync</div>
            <div class="tagline">Sync your attendance. Secure your future.</div>
        </div>
        <button class="dark-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
    </div>
    
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab(0)"><i class="fas fa-calculator"></i> Overall</button>
        <button class="nav-tab" onclick="switchTab(1)"><i class="fas fa-book"></i> Subjects</button>
        <button class="nav-tab" onclick="switchTab(2)"><i class="fas fa-calendar"></i> Total Lectures</button>
        <button class="nav-tab" onclick="switchTab(3)"><i class="fas fa-star"></i> Dream Attendance</button>
        <button class="nav-tab" onclick="switchTab(4)"><i class="fas fa-envelope"></i> Email Draft</button>
    </div>
    
    <div id="tool1" class="content active">
        <div class="glass-card">
            <h2><i class="fas fa-calculator"></i> Overall Attendance Calculator</h2>
            <div class="form-group">
                <label>Total Lectures Conducted</label>
                <input type="number" id="totalLectures" min="0" placeholder="e.g. 50">
            </div>
            <div class="form-group">
                <label>Lectures Attended</label>
                <input type="number" id="attendedLectures" min="0" placeholder="e.g. 40">
            </div>
            <div class="form-group">
                <label>No Attendance Lectures</label>
                <input type="number" id="noAttendanceTotal" min="0" placeholder="e.g. 2">
            </div>
            <button class="btn-primary" onclick="calculateOverallAttendance()"><i class="fas fa-calculator"></i> Calculate</button>
            <button class="btn-secondary" onclick="resetTool1()"><i class="fas fa-undo"></i> Reset</button>
            
            <div id="overallResults" style="display: none;">
                <div class="percentage-circle" id="percentageCircle"></div>
                <div id="eligibilityBadge" style="text-align: center; margin: 20px 0;"></div>
                <div class="stats-grid" id="statsGrid"></div>
                <div id="smartAdvice" style="margin-top: 20px;"></div>
                <div class="chart-container">
                    <canvas id="overallChart"></canvas>
                </div>
            </div>
        </div>
    </div>
    
    <div id="tool2" class="content">
        <div class="glass-card">
            <h2><i class="fas fa-book"></i> Subject-wise Attendance</h2>
            <div class="form-group"><label>Subject Name</label><input type="text" id="subjectName" placeholder="e.g. Mathematics"></div>
            <div class="form-group"><label>Total Lectures</label><input type="number" id="subjectTotal" min="0"></div>
            <div class="form-group"><label>Attended Lectures</label><input type="number" id="subjectAttended" min="0"></div>
            <div class="form-group"><label>No Attendance Lectures</label><input type="number" id="subjectNoAttendance" min="0" placeholder="e.g. 1"></div>
            <button class="btn-primary" onclick="addSubject()"><i class="fas fa-plus"></i> Add Subject</button>
            <button class="btn-secondary" onclick="resetTool2()"><i class="fas fa-undo"></i> Reset</button>
            
            <div id="subjectSummary" style="margin: 20px 0; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 12px;"></div>
            <div class="subject-list" id="subjectsList"></div>
            <div class="chart-container">
                <canvas id="subjectsChart"></canvas>
            </div>
        </div>
    </div>
    
    <div id="tool3" class="content">
        <div class="glass-card">
            <h2><i class="fas fa-calendar-alt"></i> Calculate Total Lectures</h2>
            <div class="form-group">
                <label><i class="fas fa-calendar-day"></i> Semester Start Date</label>
                <input type="date" id="startDate">
            </div>
            <div class="form-group">
                <label><i class="fas fa-calendar-day"></i> Semester End Date</label>
                <input type="date" id="endDate">
            </div>
            <div class="form-group">
                <label>Subject Name</label>
                <input type="text" id="subjectName3" placeholder="e.g. Mathematics">
            </div>
            <div class="form-group">
                <label>Lecture Days (Multi-select)</label>
                <div class="day-checkboxes">
                    <label><input type="checkbox" value="1"> Mon</label>
                    <label><input type="checkbox" value="2"> Tue</label>
                    <label><input type="checkbox" value="3"> Wed</label>
                    <label><input type="checkbox" value="4"> Thu</label>
                    <label><input type="checkbox" value="5"> Fri</label>
                    <label><input type="checkbox" value="6"> Sat</label>
                    <label><input type="checkbox" value="0"> Sun</label>
                </div>
            </div>
            <div class="form-group">
                <label>No Attendance Lecture</label>
                <input type="number" id="noAttendance" min="0" value="0">
            </div>
            <button class="btn-primary" onclick="generateLectureDates()"><i class="fas fa-search"></i> Generate Lecture Dates</button>
            <button class="btn-secondary" onclick="resetTool3()"><i class="fas fa-undo"></i> Reset</button>
            
            <div id="holidayList" style="display: none; margin-top: 20px;">
                <h4>Holiday Dates (Check to mark as OFF/Holiday):</h4>
                <div id="holidayCheckboxes" class="holiday-list" style="max-height: 300px; overflow-y: auto;"></div>
                <button class="btn-primary" onclick="calculateFinalLectures()" style="margin-top: 15px;"><i class="fas fa-calculator"></i> Calculate Final Lectures</button>
            </div>
            
            <div id="finalResults" style="display: none; margin-top: 20px;">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number" id="totalLectureDates">0</div><div>Total Dates</div></div>
                    <div class="stat-card"><div class="stat-number" id="holidayCount">0</div><div>Holidays</div></div>
                    <div class="stat-card"><div class="stat-number" id="finalLectures">0</div><div>Final Lectures</div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="tool4" class="content">
        <div class="glass-card">
            <h2><i class="fas fa-star"></i> Dream Attendance</h2>
            <div class="form-group"><label>Total Semester Lectures</label><input type="number" id="totalSemester" min="0"></div>
            <div class="form-group"><label>Lectures conducted till now</label><input type="number" id="conductedSoFar" min="0"></div>
            <div class="form-group"><label>Attended lectures till now</label><input type="number" id="currentlyAttended" min="0"></div>
            <div class="form-group"><label>Dream Attendance Target %</label><input type="number" id="dreamTarget" min="0" max="100" value="75"></div>
            <button class="btn-primary" onclick="calculateDreamGoal()"><i class="fas fa-calculator"></i> Calculate</button>
            <button class="btn-secondary" onclick="resetTool4()"><i class="fas fa-undo"></i> Reset</button>
            
            <div id="dreamResults" style="display: none; margin-top: 20px;">
                <div id="dreamAdvice" style="padding: 20px; border-radius: 12px; font-size: 18px; font-weight: bold; background: rgba(255,255,255,0.1);"></div>
            </div>
        </div>
    </div>
    
    <div id="tool5" class="content">
        <div class="glass-card">
            <h2><i class="fas fa-envelope"></i> Email Draft Generator</h2>
            <div class="form-group"><label>Full Name</label><input type="text" id="fullName" placeholder="John Doe"></div>
            <div class="form-group"><label>Enrollment No</label><input type="text" id="enrollmentNo" placeholder="2023001"></div>
            <div class="form-group"><label>Roll No</label><input type="text" id="rollNo" placeholder="101"></div>
            <div class="form-group"><label>Course</label><input type="text" id="course" placeholder="B.Tech CSE"></div>
            <div class="form-group"><label>Division</label><input type="text" id="division" placeholder="A"></div>
            <div class="form-group"><label>Your Email</label><input type="email" id="studentEmail" placeholder="john@example.com"></div>
            <div class="form-group"><label>Faculty Email</label><input type="email" id="facultyEmail" placeholder="faculty@university.com"></div>
            <div class="form-group"><label>Course Subject</label><input type="text" id="courseSubject" placeholder="Mathematics"></div>
            <div class="form-group"><label>Lecture Date</label><input type="date" id="lectureDate"></div>
            
            <div class="form-group">
                <label>Reason</label>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <button type="button" class="btn-reason active" onclick="setReason('present')" style="flex: 1; padding: 12px; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white;">Present but marked absent</button>
                    <button type="button" class="btn-reason" onclick="setReason('custom')" style="flex: 1; padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white;">Custom message</button>
                </div>
            </div>
            <div class="form-group">
                <label id="additionalLabel" style="display: none;">Additional Details (Custom Reason)</label>
                <textarea id="additionalDetails" rows="3" placeholder="Describe your situation..." style="display: none;"></textarea>
            </div>
            
            <button class="btn-primary" onclick="generateEmailDraft()"><i class="fas fa-envelope"></i> Generate Draft</button>
            <button class="btn-secondary" onclick="resetTool5()"><i class="fas fa-undo"></i> Reset</button>

            <div id="emailPreview" style="display: none;">
                <div class="email-draft" id="draftBody"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>Made By Mayank</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
